<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <!-- Grass gradient -->
    <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6a2d"/>
      <stop offset="100%" stop-color="#1b4d1b"/>
    </linearGradient>
    <!-- Beer can gradient -->
    <linearGradient id="canGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="30%" stop-color="#f0c040"/>
      <stop offset="60%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Shield shape -->
    <clipPath id="shieldClip">
      <path d="M300 40 L520 120 L520 350 Q520 500 300 570 Q80 500 80 350 L80 120 Z"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Golf ball dimples -->
    <pattern id="dimples2" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="rgba(0,0,0,0.07)"/>
    </pattern>
  </defs>

  <!-- Shield background -->
  <path d="M300 40 L520 120 L520 350 Q520 500 300 570 Q80 500 80 350 L80 120 Z" fill="url(#skyGrad)"/>
  <path d="M300 55 L505 130 L505 348 Q505 488 300 555 Q95 488 95 348 L95 130 Z" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.5"/>

  <!-- Grass hill at bottom of shield (clipped to shield shape) -->
  <clipPath id="shieldInner">
    <path d="M300 40 L520 120 L520 350 Q520 500 300 570 Q80 500 80 350 L80 120 Z"/>
  </clipPath>
  <rect x="80" y="370" width="440" height="200" fill="url(#grassGrad)" clip-path="url(#shieldInner)"/>
  <!-- Grass texture lines -->
  <path d="M150 460 Q155 450, 160 460" fill="none" stroke="#3a8a3a" stroke-width="1.5" opacity="0.5"/>
  <path d="M200 480 Q205 470, 210 480" fill="none" stroke="#3a8a3a" stroke-width="1.5" opacity="0.5"/>
  <path d="M380 470 Q385 460, 390 470" fill="none" stroke="#3a8a3a" stroke-width="1.5" opacity="0.5"/>
  <path d="M430 450 Q435 440, 440 450" fill="none" stroke="#3a8a3a" stroke-width="1.5" opacity="0.5"/>
  <path d="M280 500 Q285 490, 290 500" fill="none" stroke="#3a8a3a" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner gold border (on top of grass so it's visible all around) -->
  <path d="M300 55 L505 130 L505 348 Q505 488 300 555 Q95 488 95 348 L95 130 Z" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.5"/>



  <!-- Left side: DRIVER (inside shield, vertical, flipped) -->
  <g filter="url(#shadow)" transform="translate(255, 585) rotate(180)">
    <!-- Shaft -->
    <rect x="118" y="170" width="5" height="260" rx="2" fill="#8d6e4a"/>
    <rect x="119" y="170" width="2" height="260" rx="1" fill="#a0825c"/>
    <!-- Grip -->
    <rect x="116" y="405" width="9" height="25" rx="3" fill="#333"/>
    <rect x="116" y="407" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <rect x="116" y="413" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <rect x="116" y="419" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <!-- Driver head -->
    <g transform="translate(120, 166)">
      <ellipse cx="-10" cy="0" rx="20" ry="13" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
      <ellipse cx="-10" cy="0" rx="17" ry="10" fill="#3a3a3a"/>
      <ellipse cx="1" cy="0" rx="2" ry="9" fill="#555" opacity="0.6"/>
      <ellipse cx="-13" cy="-4" rx="8" ry="3" fill="rgba(255,255,255,0.1)"/>
    </g>
  </g>

  <!-- Right side: PUTTER (inside shield, vertical) -->
  <g filter="url(#shadow)">
    <!-- Shaft -->
    <rect x="463" y="170" width="4" height="260" rx="2" fill="#b0b0b0"/>
    <rect x="464" y="170" width="2" height="260" rx="1" fill="#d0d0d0"/>
    <!-- Grip -->
    <rect x="461" y="405" width="9" height="25" rx="3" fill="#333"/>
    <rect x="461" y="407" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <rect x="461" y="413" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <rect x="461" y="419" width="9" height="3" rx="1" fill="#555" opacity="0.5"/>
    <!-- Putter head -->
    <g transform="translate(465, 166)">
      <rect x="-16" y="-5" width="32" height="10" rx="2" fill="#888" stroke="#666" stroke-width="1.5"/>
      <rect x="-14" y="-4" width="28" height="8" rx="2" fill="#999"/>
      <rect x="8" y="-3" width="3" height="6" rx="1" fill="#666"/>
      <rect x="-12" y="-2" width="16" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
    </g>
  </g>

  <!-- BEERS text - top -->
  <text x="300" y="170" font-family="'Impact', 'Arial Black', sans-serif" font-size="65" fill="#f0c040" stroke="#8b6914" stroke-width="2.5" text-anchor="middle" letter-spacing="6" filter="url(#glow)">BEERS</text>

  <!-- 'n' text -->
  <text x="300" y="210" font-family="'Georgia', serif" font-style="italic" font-size="28" fill="#fff9c4" text-anchor="middle" opacity="0.9">'n'</text>

  <!-- BOGIES text -->
  <text x="300" y="280" font-family="'Impact', 'Arial Black', sans-serif" font-size="65" fill="#f0c040" stroke="#8b6914" stroke-width="2.5" text-anchor="middle" letter-spacing="6" filter="url(#glow)">BOGIES</text>

  <!-- Giant golf ball character sitting on the grass -->
  <g filter="url(#shadow)" transform="translate(0, 60)">
    <!-- Golf ball body -->
    <circle cx="300" cy="340" r="65" fill="#f0f0e8"/>
    <circle cx="300" cy="340" r="65" fill="url(#dimples2)"/>
    <circle cx="300" cy="340" r="65" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <!-- Shine -->
    <ellipse cx="280" cy="310" rx="20" ry="12" fill="rgba(255,255,255,0.4)"/>

    <!-- Sunglasses (cool factor) -->
    <g>
      <!-- Left lens -->
      <rect x="262" y="320" width="30" height="22" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <rect x="265" y="323" width="10" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
      <!-- Right lens -->
      <rect x="308" y="320" width="30" height="22" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
      <rect x="311" y="323" width="10" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
      <!-- Bridge -->
      <path d="M292 332 Q300 328, 308 332" fill="none" stroke="#333" stroke-width="2"/>
      <!-- Temple arms -->
      <line x1="262" y1="328" x2="245" y2="322" stroke="#333" stroke-width="2"/>
      <line x1="338" y1="328" x2="355" y2="322" stroke="#333" stroke-width="2"/>
    </g>

    <!-- Big goofy grin -->
    <path d="M272 358 Q300 385, 328 358" fill="#c62828" stroke="#333" stroke-width="2"/>
    <path d="M272 358 Q300 372, 328 358" fill="#e53935"/>
    <!-- Teeth -->
    <rect x="288" y="358" width="10" height="8" rx="1" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <rect x="300" y="358" width="10" height="8" rx="1" fill="white" stroke="#ddd" stroke-width="0.5"/>

    <!-- Rosy cheeks -->
    <circle cx="260" cy="350" r="8" fill="rgba(255,100,100,0.25)"/>
    <circle cx="340" cy="350" r="8" fill="rgba(255,100,100,0.25)"/>

    <!-- Little arms -->
    <!-- Left arm holding beer can -->
    <path d="M240 350 Q210 340, 195 310" fill="none" stroke="#ddd" stroke-width="5" stroke-linecap="round"/>
    <path d="M240 350 Q210 340, 195 310" fill="none" stroke="#f0f0e8" stroke-width="3" stroke-linecap="round"/>
    <!-- Right arm - thumbs up -->
    <path d="M360 350 Q390 340, 400 315" fill="none" stroke="#ddd" stroke-width="5" stroke-linecap="round"/>
    <path d="M360 350 Q390 340, 400 315" fill="none" stroke="#f0f0e8" stroke-width="3" stroke-linecap="round"/>

    <!-- Little legs -->
    <path d="M275 400 L265 440" stroke="#ddd" stroke-width="5" stroke-linecap="round"/>
    <path d="M275 400 L265 440" stroke="#f0f0e8" stroke-width="3" stroke-linecap="round"/>
    <path d="M325 400 L335 440" stroke="#ddd" stroke-width="5" stroke-linecap="round"/>
    <path d="M325 400 L335 440" stroke="#f0f0e8" stroke-width="3" stroke-linecap="round"/>
    <!-- Golf shoes -->
    <ellipse cx="258" cy="445" rx="14" ry="7" fill="#5d4037"/>
    <ellipse cx="342" cy="445" rx="14" ry="7" fill="#5d4037"/>
  </g>

  <!-- Beer can in left hand -->
  <g filter="url(#shadow)" transform="translate(170, 310) rotate(-15)">
    <rect x="0" y="0" width="28" height="50" rx="5" fill="url(#canGrad)" stroke="#b8860b" stroke-width="1"/>
    <!-- Can top -->
    <ellipse cx="14" cy="2" rx="14" ry="5" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>
    <!-- Tab -->
    <ellipse cx="14" cy="2" rx="5" ry="2" fill="#aaa"/>
    <!-- Label -->
    <rect x="3" y="15" width="22" height="22" rx="2" fill="#c62828"/>
    <text x="14" y="30" font-family="'Impact', sans-serif" font-size="8" fill="white" text-anchor="middle">BEER</text>
    <!-- Can shine -->
    <rect x="4" y="5" width="4" height="38" rx="2" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Thumbs up on right hand -->
  <g transform="translate(393, 358)">
    <ellipse cx="5" cy="0" rx="7" ry="10" fill="#f0f0e8" stroke="#ccc" stroke-width="1"/>
    <rect x="0" y="2" width="14" height="8" rx="3" fill="#f0f0e8" stroke="#ccc" stroke-width="1"/>
  </g>

  <!-- Golf flag stuck in ball's head like a hat -->
  <line x1="300" y1="335" x2="300" y2="300" stroke="#555" stroke-width="2"/>
  <polygon points="300,300 325,310 300,318" fill="#c62828"/>


  <!-- Splashing beer drops around -->
  <circle cx="165" cy="330" r="3" fill="#f0c040" opacity="0.5"/>
  <circle cx="175" cy="318" r="2" fill="#f0c040" opacity="0.4"/>
  <circle cx="158" cy="342" r="2.5" fill="#f0c040" opacity="0.3"/>
  <circle cx="182" cy="308" r="1.5" fill="#f0c040" opacity="0.4"/>

  <!-- Outer gold border (on top of everything for consistent thickness) -->
  <path d="M300 40 L520 120 L520 350 Q520 500 300 570 Q80 500 80 350 L80 120 Z" fill="none" stroke="#d4a017" stroke-width="6"/>
</svg>